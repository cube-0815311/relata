server:
  port: 8080

spring:
  application:
    name: relata
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:file:./data/relata;MODE=MySQL;DATABASE_TO_UPPER=false
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  flyway:
    enabled: true
    locations: classpath:db/migration
  jackson:
    default-property-inclusion: non_null
  ai:
    dashscope:
      api-key: ${DASHSCOPE_API_KEY:xxx}

relata:
  sql:
    default-limit: 500
    query-timeout-seconds: 30
