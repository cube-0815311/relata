server:
  port: 8080

logging:
  level:
    com.relata.ai: DEBUG

spring:
  application:
    name: relata
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:file:./data/relata;MODE=MySQL;DATABASE_TO_UPPER=false
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  flyway:
    enabled: true
    locations: classpath:db/migration
  jackson:
    default-property-inclusion: non_null
  ai:
    dashscope:
      api-key: ${DASHSCOPE_API_KEY:xxx}

relata:
  ai:
    default-model: ${RELATA_AI_DEFAULT_MODEL:deepseek-v4-pro}
    deepseek:
      base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
      api-key: ${DEEPSEEK_API_KEY:}
      flash-model: ${DEEPSEEK_FLASH_MODEL:deepseek-v4-flash}
      pro-model: ${DEEPSEEK_PRO_MODEL:deepseek-v4-pro}
  sql:
    default-limit: 500
    query-timeout-seconds: 30
